name: Scrape Deprecations

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked

      - name: Scrape and generate all feeds
        id: scrape
        run: uv run python -m src.main
        env:
          SCRAPE_STATUS_FILE: .scrape-status.json

      - name: Commit and push changes
        if: ${{ success() }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data.json docs/v1/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update deprecation data - $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Check scrape status
        if: ${{ always() }}
        env:
          SCRAPE_OUTCOME: ${{ steps.scrape.outcome }}
          SCRAPE_STATUS_FILE: .scrape-status.json
        run: uv run python -m src.check_scrape_status
